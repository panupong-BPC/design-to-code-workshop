openapi: 3.0.3
info:
  title: Auth BFF Service - Terms and Conditions
  description: API for user authentication and terms and conditions management.
  version: 1.0.0
servers:
  - url: /rest/api/v1/auth
    description: Auth Service Root

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - userId
        - password
      properties:
        userId:
          type: string
          example: "user123"
        password:
          type: string
          format: password
          example: "password123"

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expiresAt:
          type: string
          format: date-time
          example: "2026-05-06T15:00:00Z"
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      properties:
        userId:
          type: string
          example: "user123"
        fullName:
          type: string
          example: "John Doe"
        role:
          type: string
          example: "ADMIN"
        branchCode:
          type: string
          example: "001"
        branchName:
          type: string
          example: "Head Office"

    TermsContentResponse:
      type: object
      properties:
        title:
          type: string
          example: "Terms and Conditions"
        lastUpdated:
          type: string
          format: date-time
          example: "2026-05-01T00:00:00Z"
        sections:
          type: array
          items:
            $ref: '#/components/schemas/TermsSection'

    TermsSection:
      type: object
      properties:
        heading:
          type: string
          example: "1. Introduction"
        body:
          type: string
          example: "Welcome to our service..."

    TermsAcceptRequest:
      type: object
      required:
        - acceptedAt
      properties:
        acceptedAt:
          type: string
          format: date-time
          description: "ISO8601 timestamp when the user accepted the terms."
          example: "2026-05-06T10:30:00Z"

    APIResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
          example: "success"
        data:
          type: object
          nullable: true
        message:
          type: string
          example: "OK"

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        message:
          type: string
          example: "Invalid credentials"

paths:
  /login:
    post:
      summary: Authenticate user
      description: Authenticate user with email and password. Returns session token and user profile.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing or malformed fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /terms:
    get:
      summary: Retrieve terms and conditions
      description: Retrieve terms and conditions content.
      operationId: getTerms
      responses:
        '200':
          description: Terms content object
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/TermsContentResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /terms/accept:
    post:
      summary: Accept terms and conditions
      description: Record that the authenticated user has accepted the terms.
      operationId: acceptTerms
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TermsAcceptRequest'
      responses:
        '200':
          description: Acceptance recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '400':
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
